services:
  localstack:
    # 4.5 patches LocalStack's upload-path memory leaks; cap + restart contain any regression cleanly.
    image: localstack/localstack:4.5
    restart: unless-stopped
    mem_limit: 6g
    memswap_limit: 6g
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      - SERVICES=s3,iam,sts
      # LocalStack's global CORS filter runs before bucket CORS and blocks
      # unknown origins by default. The app serves on :3000.
      - EXTRA_CORS_ALLOWED_ORIGINS=http://localhost:3000
      - PERSISTENCE=1
    volumes:
      - "./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh"
      - localstack-data:/var/lib/localstack

  # Local email inbox - web UI at http://localhost:8025
  # To use: set RESEND_API_KEY=smtp in .env.local and point nodemailer at port 1025.
  # Leave RESEND_API_KEY=dev to use the simpler console-log bypass instead.
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "127.0.0.1:1025:1025"   # SMTP
      - "127.0.0.1:8025:8025"   # Web UI

volumes:
  localstack-data:
